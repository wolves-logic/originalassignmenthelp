{% extends "base.html" %}

{% block title %}Page Not Found - Original Assignment Help{% endblock %}

{% block content %}
<section class="py-5 text-center">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Using a standard Bootstrap icon for 404 -->
                <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 5rem;"></i>
                <h1 class="display-1 fw-bold text-dark mt-3">404</h1>
                <h2 class="mb-4">Page Not Found</h2>
                <p class="lead text-muted mb-5">
                    We're sorry, the page you're looking for doesn't exist. It might have been moved, 
                    or the link might be broken.
                </p>
                <a href="{% url 'home' %}" class="btn btn-primary btn-lg px-4 rounded-pill shadow-sm">
                    <i class="bi bi-house-door me-2"></i>Back to Home
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
