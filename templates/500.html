<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Original Assignment Help</title>
    <!-- Note: Pulling Bootstrap from CDN just for the 500 page to ensure it renders 
         even if the static file server or volume mounts are broken. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="container text-center py-5">
        <h1 class="display-1 fw-bold text-danger">500</h1>
        <h2 class="mb-4">Internal Server Error</h2>
        <p class="lead text-muted mb-5">
            Oops! Something went wrong on our servers. Our technical team has been automatically notified.
            Please try again in a few minutes.
        </p>
        <a href="/" class="btn btn-primary btn-lg px-4 rounded-pill">
            Attempt to Return Home
        </a>
    </div>
</body>
</html>
