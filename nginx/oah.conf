# ─────────────────────────────────────────────────────────────────────────────
# oah.conf — Nginx virtual host for originalassignmenthelp.com
#
# Architecture:
#   Browser → Nginx (SSL termination, static files) → Gunicorn (Django)
#
# SSL:
#   Certificates managed by Certbot (Let's Encrypt).
#   Run: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Blue/Green:
#   The upstream is defined in /etc/nginx/conf.d/oah_upstream.conf
#   The deploy script updates that file and calls `nginx -s reload`.
#   Replace 'yourdomain.com' with your actual domain below.
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge (certbot needs this before cert exists)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other HTTP traffic goes to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Main Application ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS Certificates (Certbot fills these in) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # ── TLS Protocol Configuration ───────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;       # Let client choose (TLS 1.3 best practice)
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;             # Disable for perfect forward secrecy

    # OCSP Stapling — speeds up TLS handshake (server bundles cert status)
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── HSTS ─────────────────────────────────────────────────────────────────
    # Tells browsers to ONLY use HTTPS for 1 year.
    # Also set in Django settings.py via SECURE_HSTS_SECONDS — belt and braces.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Static Files — served directly by Nginx (no Django/Gunicorn) ─────────
    # Django's `collectstatic` writes to /app/staticfiles/,
    # which is bind-mounted to /opt/oah/staticfiles/ on the host.
    # Nginx reads directly from the host volume — 0 Python processes involved.
    location /static/ {
        alias /opt/oah/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;    # Suppress noise — these are cached assets

        # Serve pre-compressed .gz files if the client supports it
        gzip_static on;
    }

    # ── Health check — load balancer / Docker health probe ───────────────────
    location /health/ {
        proxy_pass         http://oah_app;
        proxy_set_header   Host $host;
        access_log         off;    # Suppress health check spam from logs
    }

    # ── Django Admin — stricter rate limiting ─────────────────────────────────
    location /admin/ {
        limit_req  zone=oah_admin burst=10 nodelay;

        proxy_pass         http://oah_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # CRITICAL: Django reads this to determine if the connection is HTTPS.
        # settings.py: SECURE_PROXY_SSL_HEADER = ("HTTP_X_FORWARDED_PROTO", "https")
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;
    }

    # ── Application — all other requests ─────────────────────────────────────
    location / {
        limit_req  zone=oah_general burst=50 nodelay;

        proxy_pass         http://oah_app;

        # Pass headers Django needs for correct URL building
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;   # ← SECURE_PROXY_SSL_HEADER

        # Timeouts — must be >= Gunicorn's timeout (120 s)
        proxy_connect_timeout  10s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;

        # Buffering — improves throughput for larger responses
        proxy_buffering        on;
        proxy_buffer_size      8k;
        proxy_buffers          16 8k;
        proxy_busy_buffers_size 16k;

        # Do not intercept upstream 404/500 — let Django render its pages
        proxy_intercept_errors off;
    }

    # ── Common error pages ────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
