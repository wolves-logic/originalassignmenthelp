user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65536;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time urt=$upstream_response_time';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    types_hash_max_size 4096;
    server_tokens       off;          # Never expose Nginx version

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ── Security headers (applied to all virtual servers) ────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header X-XSS-Protection        "1; mode=block"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size    20m;
    client_body_timeout     30s;
    client_header_timeout   30s;
    send_timeout            60s;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=oah_general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=oah_admin:10m   rate=5r/s;
    limit_req_status 429;

    # ── Upstream (managed by deploy script — do not edit manually) ───────────
    # File: /etc/nginx/conf.d/oah_upstream.conf
    # Contents: upstream oah_app { server 127.0.0.1:<port>; keepalive 32; }

    include /etc/nginx/conf.d/*.conf;
}
