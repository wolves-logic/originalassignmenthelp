# ─────────────────────────────────────────────────────────────────────────────
# deploy.yml — CI/CD pipeline for Original Assignment Help (Django)
#
# architecture:
#   1. test        — Django system check + migrations test
#   2. build-push  — Docker build → push to GitHub Container Registry (GHCR)
#   3. deploy      — SSH to EC2, pull image, blue/green container swap
# ─────────────────────────────────────────────────────────────────────────────

name: Build · Test · Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Docker image names must be lowercase.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Test
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Django System Check & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oah_test
          POSTGRES_USER: oah
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write CI .env
        run: |
          cat > .env <<EOF
          SECRET_KEY=ci-only-insecure-key-${{ github.run_id }}
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1
          USE_RDS=True
          RDS_DB_HOST=127.0.0.1
          RDS_DB_NAME=oah_test
          RDS_DB_USER=oah
          RDS_DB_PASSWORD=testpass
          RDS_DB_PORT=5432
          RDS_SSL_MODE=disable
          USE_S3=False
          USE_CACHE=False
          EOF
      - run: python manage.py check --deploy || true
      - run: python manage.py migrate --noinput

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & Push
  # ──────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ env.REGISTRY }}/${{ steps.lower.outputs.repo }}:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repo name
        id: lower
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.lower.outputs.repo }}:sha-${{ github.sha }},${{ env.REGISTRY }}/${{ steps.lower.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy (Zero-Downtime Blue/Green)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Generate Deployment Script
        run: |
          cat > deploy.sh <<'EOF'
          set -euo pipefail
          IMAGE="${{ needs.build-push.outputs.image_tag }}"
          APP_DIR="/opt/oah"
          
          echo "[1/4] Pulling $IMAGE"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull "$IMAGE"
          
          BLUE_ACTIVE=$(docker ps --filter "name=^oah_blue$" --format "{{.Names}}" | wc -l)
          if [ "$BLUE_ACTIVE" -gt "0" ]; then
            NEW="green"; NEW_PORT=8002; OLD="blue"
          else
            NEW="blue";  NEW_PORT=8001; OLD="green"
          fi
          
          echo "[2/4] Deploying to $NEW slot (port $NEW_PORT)"
          docker rm -f "oah_$NEW" 2>/dev/null || true
          docker run -d --name "oah_$NEW" --env-file "$APP_DIR/.env" \
            -v "$APP_DIR/staticfiles:/app/staticfiles" -v "$APP_DIR/logs:/app/logs" \
            -p "127.0.0.1:$NEW_PORT:8000" --restart unless-stopped "$IMAGE"
          
          echo "[3/4] Warming up..."
          sleep 10
          
          echo "[4/4] Swapping Nginx Upstream"
          UPSTREAM="/etc/nginx/conf.d/oah_upstream.conf"
          echo "upstream oah_app { server 127.0.0.1:$NEW_PORT; keepalive 32; }" | sudo tee "$UPSTREAM" > /dev/null
          sudo nginx -t && sudo nginx -s reload
          
          sleep 5
          docker stop "oah_$OLD" 2>/dev/null || true
          docker rm "oah_$OLD" 2>/dev/null || true
          docker image prune -f --filter "until=24h"
          EOF

      - name: Execute Remote SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: bash -s < deploy.sh
