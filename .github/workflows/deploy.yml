# ─────────────────────────────────────────────────────────────────────────────
# deploy.yml — CI/CD pipeline for Original Assignment Help (Django)
# ─────────────────────────────────────────────────────────────────────────────

name: Build · Test · Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Django System Check & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oah_test
          POSTGRES_USER: oah
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write CI .env
        run: |
          cat > .env <<EOF
          SECRET_KEY=ci-only-insecure-key-${{ github.run_id }}
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1
          USE_RDS=True
          RDS_DB_HOST=127.0.0.1
          RDS_DB_NAME=oah_test
          RDS_DB_USER=oah
          RDS_DB_PASSWORD=testpass
          RDS_DB_PORT=5432
          RDS_SSL_MODE=disable
          USE_S3=False
          USE_CACHE=False
          EOF
      - run: python manage.py check --deploy || true
      - run: python manage.py migrate --noinput

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ env.REGISTRY }}/${{ steps.lower.outputs.repo }}:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
      - name: Lowercase repo name
        id: lower
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.lower.outputs.repo }}:sha-${{ github.sha }},${{ env.REGISTRY }}/${{ steps.lower.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Execute Remote SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: false
          command_timeout: 15m
          script: |
            bash <<'EOF'
            set -e
            IMAGE="${{ needs.build-push.outputs.image_tag }}"
            APP_DIR="/opt/oah"
            
            echo "--- STARTING DEPLOYMENT ---"
            echo "Image: $IMAGE"
            
            # ── PERMISSION FIX ────────────────────────────────────────────────
            sudo mkdir -p "$APP_DIR/logs" "$APP_DIR/staticfiles"
            sudo chmod -R 777 "$APP_DIR/logs" "$APP_DIR/staticfiles"
            sudo chown -R $USER:$USER $APP_DIR
            # ──────────────────────────────────────────────────────────────────
            
            echo "--- STEP 1: LOGIN ---"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            echo "--- STEP 2: PULL ---"
            docker pull "$IMAGE"
            
            echo "--- STEP 3: SLOT DETECTION ---"
            ACTIVE_CONTAINERS=$(docker ps --format '{{.Names}}')
            case "$ACTIVE_CONTAINERS" in
              *oah_blue*)
                NEW="green"
                NEW_PORT="8002"
                OLD="blue"
                ;;
              *)
                NEW="blue"
                NEW_PORT="8001"
                OLD="green"
                ;;
            esac
            
            echo "Target: $NEW (Port: $NEW_PORT)"
            docker rm -f "oah_$NEW" 2>/dev/null || true
            
            docker run -d \
              --name "oah_$NEW" \
              --env-file "$APP_DIR/.env" \
              -v "$APP_DIR/staticfiles:/app/staticfiles" \
              -v "$APP_DIR/logs:/app/logs" \
              -p "127.0.0.1:$NEW_PORT:8000" \
              --restart unless-stopped \
              "$IMAGE"
            
            echo "--- STEP 4: HEALTH CHECK ---"
            echo "Allowing 30s for warmup..."
            sleep 30
            
            HEALTHY=0
            for i in {1..12}
            do
              if curl -s "http://127.0.0.1:$NEW_PORT/health/" > /dev/null
              then
                HEALTHY=1
                break
              fi
              echo "Health check attempt $i/12..."
              sleep 5
            done

            if [ "$HEALTHY" -eq 0 ]
            then
              echo "❌ ERROR: HEALTH CHECK FAILED"
              docker logs "oah_$NEW" | tail -n 50
              docker rm -f "oah_$NEW"
              exit 1
            fi

            echo "--- STEP 5: NGINX CONFIGURATION ---"
            # 1. Update Upstream
            UPSTREAM="/etc/nginx/conf.d/oah_upstream.conf"
            echo "upstream oah_app { server 127.0.0.1:$NEW_PORT; keepalive 32; }" | sudo tee "$UPSTREAM" > /dev/null
            
            # 2. Create Server Block
            VHOST="/etc/nginx/sites-available/oah"
            cat << 'INNER_EOF' | sudo tee "$VHOST" > /dev/null
            server {
                listen 80;
                server_name _;
                client_max_body_size 100M;

                location /static/ {
                    alias /opt/oah/staticfiles/;
                    expires 30d;
                }

                location / {
                    proxy_pass http://oah_app;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            INNER_EOF

            # 3. Enable site and disable default
            sudo ln -sf "$VHOST" /etc/nginx/sites-enabled/oah
            sudo rm -f /etc/nginx/sites-enabled/default
            
            # 4. Reload Nginx
            sudo nginx -t && sudo systemctl restart nginx
            
            echo "--- STEP 6: CLEANUP ---"
            sleep 5
            docker stop "oah_$OLD" 2>/dev/null || true
            docker rm "oah_$OLD" 2>/dev/null || true
            docker image prune -f --filter "until=24h"
            
            echo "--- DEPLOYMENT SUCCESSFUL ---"
            EOF
