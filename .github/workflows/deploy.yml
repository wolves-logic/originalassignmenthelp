# ─────────────────────────────────────────────────────────────────────────────
# deploy.yml — CI/CD pipeline for Original Assignment Help (Django)
#
# architecture:
#   1. test        — Django system check + migrations test
#   2. build-push  — Docker build → push to GitHub Container Registry (GHCR)
#   3. deploy      — SSH to EC2, pull image, blue/green container swap
# ─────────────────────────────────────────────────────────────────────────────

name: Build · Test · Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Test
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Django System Check & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oah_test
          POSTGRES_USER: oah
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write CI .env
        run: |
          cat > .env <<EOF
          SECRET_KEY=ci-only-insecure-key-${{ github.run_id }}
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1
          USE_RDS=True
          RDS_DB_HOST=127.0.0.1
          RDS_DB_NAME=oah_test
          RDS_DB_USER=oah
          RDS_DB_PASSWORD=testpass
          RDS_DB_PORT=5432
          RDS_SSL_MODE=disable
          USE_S3=False
          USE_CACHE=False
          EOF
      - run: python manage.py check --deploy || true
      - run: python manage.py migrate --noinput

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & Push
  # ──────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ env.REGISTRY }}/${{ steps.lower.outputs.repo }}:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repo name
        id: lower
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.lower.outputs.repo }}:sha-${{ github.sha }},${{ env.REGISTRY }}/${{ steps.lower.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy (Zero-Downtime Blue/Green)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    # Set to 'production' if using Environment Secrets, or remove to use Repository Secrets.
    # environment: production
    steps:
      - name: Execute Remote SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          # command_timeout increases the allowed time for slow pulls/builds
          command_timeout: 15m
          script: |
            set -eu
            IMAGE="${{ needs.build-push.outputs.image_tag }}"
            APP_DIR="/opt/oah"
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo " [1/4] PULLING IMAGE: $IMAGE"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "$IMAGE"
            echo " Image pull complete."

            # Verify environment prerequisites on the host VM
            if [ ! -d "$APP_DIR" ]; then 
              echo " ERROR: Application directory $APP_DIR not found on host."
              echo "Please run: sudo mkdir -p $APP_DIR && sudo chown \$USER:\$USER $APP_DIR"
              exit 1
            fi
            
            if [ ! -f "$APP_DIR/.env" ]; then
              echo " ERROR: Production .env file missing at $APP_DIR/.env"
              echo "Please create it and add your RDS/S3 credentials before deploying."
              exit 1
            fi

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo " [2/4] IDENTIFYING SLOTS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Check which container is currently running to determine target
            # Use POSIX 'case' for maximum compatibility
            ACTIVE_CONTAINERS=$(docker ps --format '{{.Names}}')
            case "$ACTIVE_CONTAINERS" in
              *oah_blue*)
                NEW="green"; NEW_PORT=8002; OLD="blue"
                ;;
              *)
                NEW="blue";  NEW_PORT=8001; OLD="green"
                ;;
            esac
            
            echo " Active slot: $OLD -> Deploying to: $NEW (port $NEW_PORT)"
            
            # Remove stale container if it exists
            docker rm -f "oah_$NEW" 2>/dev/null || true
            
            # Launch the new container
            docker run -d \
              --name "oah_$NEW" \
              --env-file "$APP_DIR/.env" \
              -v "$APP_DIR/staticfiles:/app/staticfiles" \
              -v "$APP_DIR/logs:/app/logs" \
              -p "127.0.0.1:$NEW_PORT:8000" \
              --restart unless-stopped \
              "$IMAGE"
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo " [3/4] WARMING UP & HEALTH CHECK"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Basic warmup period
            sleep 10
            
            # Simple health check polling (ensure your Django app has a /health/ endpoint)
            HEALTHY=0
            for i in {1..10}; do
              if curl -s "http://127.0.0.1:$NEW_PORT/health/" > /dev/null; then
                HEALTHY=1
                break
              fi
              echo "Waiting for health check (attempt $i/10)..."
              sleep 5
            done

            if [ "$HEALTHY" -eq 0 ]; then
              echo " HEALTH CHECK FAILED. Removing failed container."
              docker rm -f "oah_$NEW"
              exit 1
            fi
            
            echo " Container is healthy. Proceeding to traffic swap."

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo " [4/4] SWAPPING NGINX UPSTREAM"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            UPSTREAM="/etc/nginx/conf.d/oah_upstream.conf"
            echo "upstream oah_app { server 127.0.0.1:$NEW_PORT; keepalive 32; }" | sudo tee "$UPSTREAM" > /dev/null
            sudo nginx -t && sudo nginx -s reload
            
            echo " Traffic routed to $NEW slot. Cleaning up $OLD..."
            
            # Wait for in-flight requests to complete
            sleep 5
            docker stop "oah_$OLD" 2>/dev/null || true
            docker rm "oah_$OLD" 2>/dev/null || true
            
            # Clean up old images to keep disk space under control
            docker image prune -f --filter "until=24h"
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  DEPLOYMENT COMPLETE"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
